services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sandbox_db
      POSTGRES_USER: sandbox_user
      POSTGRES_PASSWORD: sandbox_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    image: sandbox-backend:1.0
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sandbox_db
      SPRING_DATASOURCE_USERNAME: sandbox_user
      SPRING_DATASOURCE_PASSWORD: sandbox_pass
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    image: sandbox-frontend:1.0
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
