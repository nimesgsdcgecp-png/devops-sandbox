name: CI Pipeline

    # 1. The Trigger: When should this run?
    on:
      push:
        branches:
          - main
          - master

    # 2. The Jobs: What should the cloud server do?
    jobs:
      build-and-test:
        # GitHub gives you a free Ubuntu server to run this on
        runs-on: ubuntu-latest

        steps:
          # Step A: Download your code onto the GitHub server
          - name: Checkout Source Code
            uses: actions/checkout@v4

          # Step B: Run Docker Compose to verify both images compile successfully
          - name: Build Docker Images
            run: docker compose build
